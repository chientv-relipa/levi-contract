[package]
name = "contract"
edition = "2024"

# Levi — AI agent firewall on Sui (Move).
#
# An on-chain gatekeeper for AI agents: it stores encrypted action intents, lets an
# off-chain LLM relayer write a verdict, tracks per-agent reputation (EMA + strikes),
# and supports owner escalation. The package is named `contract`; the on-chain module
# namespace is `levi`. The Sui framework is an implicit system dependency, so it is not
# declared here.

[dependencies]

[addresses]
levi = "0x0"
